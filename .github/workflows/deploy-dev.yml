name: Deploy to Dev

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'

env:
  AWS_REGION: ap-northeast-1
  ENVIRONMENT: dev

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event.inputs.skip_tests != 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov black flake8

      - name: Run backend checks
        run: |
          python -m compileall backend
          black --check backend/lambda
          flake8 backend/lambda --max-line-length=120 --extend-ignore=E203,E266,E501
          if [ -d backend/tests ] && find backend/tests -name "test_*.py" | grep -q .; then
            cd backend
            python -m pytest -v --cov=lambda --cov-report=term-missing
          else
            echo "⚠️ Backend tests not found, skipping"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  deploy-backend:
    name: Deploy Backend (Terraform)
    needs: test
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://dev.aigyeom.com
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda artifacts
        run: |
          ./scripts/build-lambdas.sh

      - name: Terraform preflight
        run: |
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}" ]; then
            echo "❌ Missing secret: AWS_ROLE_TO_ASSUME_DEV"
            exit 1
          fi

          if [ ! -f terraform/envs/dev/main.tf ]; then
            echo "❌ Missing terraform/envs/dev/main.tf"
            exit 1
          fi

          ./scripts/tf.sh init dev
          ./scripts/tf.sh validate dev
          ./scripts/tf.sh plan dev -out=tfplan
          if [ ! -f terraform/envs/dev/tfplan ]; then
            echo "❌ Terraform plan file not generated"
            exit 1
          fi
          terraform -chdir=terraform/envs/dev show -no-color tfplan | sed -n '1,160p'

      - name: Deploy Terraform stack
        run: |
          ./scripts/tf.sh apply dev -auto-approve tfplan

      - name: Run backend smoke test
        run: |
          API_URL=$(./scripts/tf.sh output dev -raw api_base_url)
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "❌ API_URL not found from Terraform output"
            exit 1
          fi
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || echo "000")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
            echo "✅ API is reachable"
          else
            echo "⚠️ API health check returned: $HTTP_CODE"
            exit 1
          fi

  deploy-frontend:
    name: Deploy Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend using Terraform outputs
        run: |
          ./scripts/deploy-frontend.sh dev

  notify:
    name: Notify Deployment Status
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BACKEND_STATUS="${{ needs.deploy-backend.result }}"
          FRONTEND_STATUS="${{ needs.deploy-frontend.result }}"

          COLOR="16776960"
          EMOJI="⚠️"
          MESSAGE="Dev deployment status: ${BACKEND_STATUS}/${FRONTEND_STATUS}"

          if [ "$BACKEND_STATUS" = "success" ] && [ "$FRONTEND_STATUS" = "success" ]; then
            COLOR="3066993"
            EMOJI="✅"
          elif [ "$BACKEND_STATUS" = "failure" ] || [ "$FRONTEND_STATUS" = "failure" ]; then
            COLOR="15158332"
            EMOJI="❌"
          fi

          payload=$(cat <<EOF
          {
            "embeds": [{
              "title": "$EMOJI Dev Deployment",
              "description": "**Status:** $MESSAGE\n**Branch:** ${{ github.ref_name }}\n**Commit:** ${{ github.sha }}",
              "color": $COLOR,
              "footer": {
                "text": "ProfilePhotoAI CI/CD"
              }
            }]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord notification skipped"
