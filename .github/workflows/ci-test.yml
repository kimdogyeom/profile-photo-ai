name: CI Tests

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ develop ]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov black flake8
      
      - name: Lint and type-independent checks
        run: |
          echo "🔍 Running Python checks..."
          python -m compileall backend
          black --check backend/lambda
          
          flake8 backend/lambda --max-line-length=120 --extend-ignore=E203,E266,E501
      
      - name: Run Python unit tests
        run: |
          echo "🧪 Running unit tests..."
          if [ -d backend/tests ] && find backend/tests -name "test_*.py" | grep -q .; then
            cd backend
            python -m pytest -v --cov=backend/lambda --cov-report=term-missing
          else
            echo "⚠️ Backend tests not found, skipping"
          fi
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Build frontend
        run: |
          cd frontend
          npm run build
      
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
      
      - name: Check for secrets in code
        run: |
          echo "🔒 Checking for exposed secrets..."
          if rg -n --pcre2 "AKIA[0-9A-Z]{16}" --glob '!.git' --glob '!node_modules' --glob '!.terraform' .; then
            echo "❌ AWS Access Key found in code!"
            exit 1
          fi
          if rg -n --pcre2 "AIza[0-9A-Za-z-_]{35}" --glob '!.git' --glob '!node_modules' --glob '!.terraform' .; then
            echo "❌ Google API Key found in code!"
            exit 1
          fi
          echo "✅ No secrets found"

  validate-terraform:
    name: Validate Terraform
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Validate bootstrap configuration
        run: |
          terraform -chdir=terraform/bootstrap init -backend=false
          terraform -chdir=terraform/bootstrap validate
      
      - name: Validate dev environment
        run: |
          terraform -chdir=terraform/envs/dev init -backend=false
          terraform -chdir=terraform/envs/dev validate
      
      - name: Validate prod environment
        run: |
          terraform -chdir=terraform/envs/prod init -backend=false
          terraform -chdir=terraform/envs/prod validate
