name: Verify Actions Preflight

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Which environment preflight to verify
        required: true
        default: both
        type: choice
        options:
          - both
          - dev
          - prod

concurrency:
  group: verify-actions-preflight-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-1
  PYTHON_VERSION: "3.12.3"
  TERRAFORM_VERSION: "1.13.3"

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Validate bootstrap configuration
        run: |
          terraform -chdir=terraform/bootstrap init -backend=false
          terraform -chdir=terraform/bootstrap validate

      - name: Validate dev environment
        run: |
          terraform -chdir=terraform/envs/dev init -backend=false
          terraform -chdir=terraform/envs/dev validate

      - name: Validate prod environment
        run: |
          terraform -chdir=terraform/envs/prod init -backend=false
          terraform -chdir=terraform/envs/prod validate

  build-lambda-artifacts:
    name: Build Lambda Artifacts
    needs: terraform-validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda artifacts
        run: ./scripts/build-lambdas.sh

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verify-lambda-artifacts-${{ github.sha }}
          path: dist/lambda/*.zip
          if-no-files-found: error
          retention-days: 3

  dev-preflight:
    name: Dev Preflight Plan
    if: github.event_name == 'pull_request' || github.event.inputs.target == 'both' || github.event.inputs.target == 'dev'
    needs:
      - terraform-validate
      - build-lambda-artifacts
    runs-on: ubuntu-latest
    environment:
      name: dev
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
      TF_VAR_hosted_zone_name: ${{ vars.TF_VAR_HOSTED_ZONE_NAME }}
      TF_VAR_discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: verify-lambda-artifacts-${{ github.sha }}
          path: dist/lambda

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Dev preflight
        run: |
          if [ -z "${{ vars.AWS_ROLE_TO_ASSUME_DEV }}" ]; then
            echo "Missing variable: AWS_ROLE_TO_ASSUME_DEV"
            exit 1
          fi

          OPTIONAL_DOMAIN_VARS=(TF_VAR_domain_name TF_VAR_hosted_zone_name)
          PROVIDED_COUNT=0
          for name in "${OPTIONAL_DOMAIN_VARS[@]}"; do
            if [ -n "${!name:-}" ]; then
              PROVIDED_COUNT=$((PROVIDED_COUNT + 1))
            fi
          done
          if [ "$PROVIDED_COUNT" -gt 0 ] && [ "$PROVIDED_COUNT" -lt "${#OPTIONAL_DOMAIN_VARS[@]}" ]; then
            echo "Dev preflight requires all domain TF_VAR_* values when any custom-domain value is set"
            exit 1
          fi

          ./scripts/tf.sh init dev
          ./scripts/tf.sh validate dev
          ./scripts/tf.sh plan dev -out=tfplan
          terraform -chdir=terraform/envs/dev show -no-color tfplan > terraform/envs/dev/tfplan.txt

      - name: Upload dev preflight artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verify-dev-tfplan-${{ github.sha }}-${{ github.run_id }}
          path: |
            terraform/envs/dev/tfplan
            terraform/envs/dev/tfplan.txt
          if-no-files-found: error
          retention-days: 3

  prod-preflight:
    name: Prod Preflight Plan
    if: github.event_name == 'pull_request' || github.event.inputs.target == 'both' || github.event.inputs.target == 'prod'
    needs:
      - terraform-validate
      - build-lambda-artifacts
    runs-on: ubuntu-latest
    environment:
      name: prod
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
      TF_VAR_hosted_zone_name: ${{ vars.TF_VAR_HOSTED_ZONE_NAME }}
      TF_VAR_discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: verify-lambda-artifacts-${{ github.sha }}
          path: dist/lambda

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prod preflight
        run: |
          if [ -z "${{ vars.AWS_ROLE_TO_ASSUME_PROD }}" ]; then
            echo "Missing variable: AWS_ROLE_TO_ASSUME_PROD"
            exit 1
          fi

          REQUIRED_TF_VARS=(TF_VAR_domain_name TF_VAR_hosted_zone_name)
          for name in "${REQUIRED_TF_VARS[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required prod Terraform variable: $name"
              exit 1
            fi
          done

          ./scripts/tf.sh init prod
          ./scripts/tf.sh validate prod
          ./scripts/tf.sh plan prod -out=tfplan
          terraform -chdir=terraform/envs/prod show -no-color tfplan > terraform/envs/prod/tfplan.txt

      - name: Upload prod preflight artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verify-prod-tfplan-${{ github.sha }}-${{ github.run_id }}
          path: |
            terraform/envs/prod/tfplan
            terraform/envs/prod/tfplan.txt
          if-no-files-found: error
          retention-days: 3
