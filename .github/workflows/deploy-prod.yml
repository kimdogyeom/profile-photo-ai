name: Deploy to Production

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "DEPLOY" to confirm prod deployment'
        required: true

env:
  AWS_REGION: ap-northeast-1
  ENVIRONMENT: prod

jobs:
  validate-input:
    name: Validate Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment:
      name: prod

    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DEPLOY" ]; then
            echo "❌ Confirmation failed. You must type 'DEPLOY' to proceed."
            exit 1
          fi
          echo "✅ Deployment confirmed"

  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov black flake8

      - name: Run backend checks
        run: |
          python -m compileall backend
          black --check backend/lambda
          flake8 backend/lambda --max-line-length=120 --extend-ignore=E203,E266,E501
          if [ -d backend/tests ] && find backend/tests -name "test_*.py" | grep -q .; then
            cd backend
            python -m pytest -v --cov=lambda --cov-report=term-missing
          else
            echo "⚠️ Backend tests not found, skipping"
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  deploy-backend:
    name: Deploy Backend to Production
    needs: [test, validate-input]
    if: github.event_name != 'workflow_dispatch' || needs.validate-input.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://aigyeom.com
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build Lambda artifacts
        run: |
          ./scripts/build-lambdas.sh

      - name: Terraform preflight
        run: |
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}" ]; then
            echo "❌ Missing secret: AWS_ROLE_TO_ASSUME_PROD"
            exit 1
          fi

          if [ ! -f terraform/envs/prod/main.tf ]; then
            echo "❌ Missing terraform/envs/prod/main.tf"
            exit 1
          fi

          ./scripts/tf.sh init prod
          ./scripts/tf.sh validate prod
          ./scripts/tf.sh plan prod -out=tfplan
          if [ ! -f terraform/envs/prod/tfplan ]; then
            echo "❌ Terraform plan file not generated"
            exit 1
          fi
          terraform -chdir=terraform/envs/prod show -no-color tfplan | sed -n '1,160p'

      - name: Deploy Terraform stack
        run: |
          ./scripts/tf.sh apply prod -auto-approve tfplan

      - name: Run prod smoke tests
        run: |
          API_URL=$(./scripts/tf.sh output prod -raw api_base_url)
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "❌ API_URL not found from Terraform output"
            exit 1
          fi
          STATUS="failure"
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${API_URL}/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "404" ]; then
              echo "✅ API is healthy"
              STATUS="success"
              break
            fi
            echo "Attempt $i: HTTP $HTTP_CODE, retrying in 10s..."
            sleep 10
          done
          if [ "$STATUS" != "success" ]; then
            echo "❌ API health check failed after retries"
            exit 1
          fi

  deploy-frontend:
    name: Deploy Frontend to Prod
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment:
      name: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend using Terraform outputs
        run: |
          ./scripts/deploy-frontend.sh prod

  notify:
    name: Notify Deployment Status
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send deployment notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BACKEND_STATUS="${{ needs.deploy-backend.result }}"
          FRONTEND_STATUS="${{ needs.deploy-frontend.result }}"
          
          if [ "$BACKEND_STATUS" = "success" ] && [ "$FRONTEND_STATUS" = "success" ]; then
            COLOR="3066993"
            EMOJI="✅"
            MESSAGE="Prod deployment successful!"
          elif [ "$BACKEND_STATUS" = "failure" ] || [ "$FRONTEND_STATUS" = "failure" ]; then
            COLOR="15158332"
            EMOJI="❌"
            MESSAGE="Prod deployment failed!"
          else
            COLOR="16776960"
            EMOJI="⚠️"
            MESSAGE="Prod deployment status: ${BACKEND_STATUS}/${FRONTEND_STATUS}"
          fi

          payload=$(cat <<EOF
          {
            "content": "@here",
            "embeds": [{
              "title": "$EMOJI Prod Deployment",
              "description": "$MESSAGE\n**Backend:** $BACKEND_STATUS\n**Frontend:** $FRONTEND_STATUS\n**Commit:** ${{ github.sha }}",
              "color": $COLOR,
              "footer": {
                "text": "ProfilePhotoAI Prod"
              }
            }]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord notification skipped"
