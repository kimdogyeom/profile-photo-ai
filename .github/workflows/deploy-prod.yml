name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type "DEPLOY" to confirm prod deployment
        required: true

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-1
  ENVIRONMENT: prod
  PYTHON_VERSION: "3.12.3"
  TERRAFORM_VERSION: "1.13.3"
  PYTHON_LINT_PATHS: backend/common backend/lambda/api backend/lambda/file_transfer backend/lambda/process tests
  FRONTEND_API_BASE_URL: https://example.execute-api.ap-northeast-1.amazonaws.com/prod
  FRONTEND_AWS_REGION: ap-northeast-1
  FRONTEND_COGNITO_USER_POOL_ID: ap-northeast-1_ciuserpool
  FRONTEND_COGNITO_CLIENT_ID: abcdefghijklmnopqrstuvwxyz

jobs:
  validate-input:
    name: Validate Deployment
    runs-on: ubuntu-latest
    environment:
      name: prod

    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DEPLOY" ]; then
            echo "Confirmation failed. You must type 'DEPLOY' to proceed."
            exit 1
          fi

  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    needs: validate-input
    environment:
      name: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8 boto3
          pip install -r backend/lambda/api/requirements.txt
          pip install -r backend/lambda/file_transfer/requirements.txt
          pip install -r backend/lambda/process/requirements.txt

      - name: Run backend checks
        run: |
          python -m compileall backend
          flake8 ${{ env.PYTHON_LINT_PATHS }} --max-line-length=120 --extend-ignore=E203,E266,E501
          python -m pytest --collect-only -q tests/unit tests/integration
          python -m pytest -v tests/unit tests/integration --cov=backend --cov-report=term-missing

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test:ci
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ env.FRONTEND_API_BASE_URL }}
          REACT_APP_AWS_REGION: ${{ env.FRONTEND_AWS_REGION }}
          REACT_APP_COGNITO_USER_POOL_ID: ${{ env.FRONTEND_COGNITO_USER_POOL_ID }}
          REACT_APP_COGNITO_CLIENT_ID: ${{ env.FRONTEND_COGNITO_CLIENT_ID }}

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: ${{ env.FRONTEND_API_BASE_URL }}
          REACT_APP_AWS_REGION: ${{ env.FRONTEND_AWS_REGION }}
          REACT_APP_COGNITO_USER_POOL_ID: ${{ env.FRONTEND_COGNITO_USER_POOL_ID }}
          REACT_APP_COGNITO_CLIENT_ID: ${{ env.FRONTEND_COGNITO_CLIENT_ID }}

  build-lambda-artifacts:
    name: Build Lambda Artifacts
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda artifacts
        run: ./scripts/build-lambdas.sh

      - name: Upload Lambda artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts-prod-${{ github.sha }}
          path: dist/lambda/*.zip
          if-no-files-found: error
          retention-days: 14

  deploy-backend:
    name: Deploy Backend to Production
    needs: build-lambda-artifacts
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://aigyeom.com
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_domain_name: ${{ vars.TF_VAR_DOMAIN_NAME }}
      TF_VAR_hosted_zone_id: ${{ vars.TF_VAR_HOSTED_ZONE_ID }}
      TF_VAR_certificate_arn: ${{ vars.TF_VAR_CERTIFICATE_ARN }}
      TF_VAR_discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Download Lambda artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts-prod-${{ github.sha }}
          path: dist/lambda

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform preflight
        run: |
          if [ -z "${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}" ]; then
            echo "Missing secret: AWS_ROLE_TO_ASSUME_PROD"
            exit 1
          fi

          REQUIRED_TF_VARS=(TF_VAR_domain_name TF_VAR_hosted_zone_id TF_VAR_certificate_arn)
          for name in "${REQUIRED_TF_VARS[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required prod Terraform variable: $name"
              exit 1
            fi
          done

          ./scripts/tf.sh init prod
          ./scripts/tf.sh validate prod
          ./scripts/tf.sh plan prod -out=tfplan
          terraform -chdir=terraform/envs/prod show -no-color tfplan > terraform/envs/prod/tfplan.txt

      - name: Upload Terraform plan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod-${{ github.sha }}-${{ github.run_id }}
          path: |
            terraform/envs/prod/tfplan
            terraform/envs/prod/tfplan.txt
          if-no-files-found: error
          retention-days: 14

      - name: Deploy Terraform stack
        run: ./scripts/tf.sh apply prod -auto-approve tfplan

      - name: Run prod smoke tests
        run: |
          API_URL=$(./scripts/tf.sh output prod -raw api_base_url)
          if [ -z "$API_URL" ] || [ "$API_URL" = "null" ]; then
            echo "API_URL not found from Terraform output"
            exit 1
          fi
          HEALTH_RESPONSE="$(curl --fail-with-body --silent --show-error "${API_URL}/healthz")"
          HEALTH_RESPONSE="$HEALTH_RESPONSE" python - <<'PY'
import json
import os

body = json.loads(os.environ["HEALTH_RESPONSE"])
assert body["status"] == "ok"
PY

  deploy-frontend:
    name: Deploy Frontend to Prod
    needs: deploy-backend
    runs-on: ubuntu-latest
    environment:
      name: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy frontend using Terraform outputs
        run: ./scripts/deploy-frontend.sh prod

  notify:
    name: Notify Deployment Status
    needs: [deploy-backend, deploy-frontend]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Send deployment notification
        if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          BACKEND_STATUS="${{ needs.deploy-backend.result }}"
          FRONTEND_STATUS="${{ needs.deploy-frontend.result }}"

          if [ "$BACKEND_STATUS" = "success" ] && [ "$FRONTEND_STATUS" = "success" ]; then
            COLOR="3066993"
            EMOJI="✅"
            MESSAGE="Prod deployment successful!"
          elif [ "$BACKEND_STATUS" = "failure" ] || [ "$FRONTEND_STATUS" = "failure" ]; then
            COLOR="15158332"
            EMOJI="❌"
            MESSAGE="Prod deployment failed!"
          else
            COLOR="16776960"
            EMOJI="⚠️"
            MESSAGE="Prod deployment status: ${BACKEND_STATUS}/${FRONTEND_STATUS}"
          fi

          payload=$(cat <<EOF
          {
            "content": "@here",
            "embeds": [{
              "title": "$EMOJI Prod Deployment",
              "description": "$MESSAGE\n**Backend:** $BACKEND_STATUS\n**Frontend:** $FRONTEND_STATUS\n**Commit:** ${{ github.sha }}",
              "color": $COLOR,
              "footer": {
                "text": "ProfilePhotoAI Prod"
              }
            }]
          }
          EOF
          )

          curl -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL" || echo "Discord notification skipped"
